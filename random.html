<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Number Generator</title>
</head>
<body>

    <center>
        <h2>Random Number Generator</h2>

        <label for="minNumber">Minimum Number:</label>
        <input type="number" id="minNumber" placeholder="Enter minimum">

        <br><br>

        <label for="maxNumber">Maximum Number:</label>
        <input type="number" id="maxNumber" placeholder="Enter maximum">

        <br><br>

        <button id="generateButton">Generate Number</button>

        <p id="result">Your random number will appear here.</p>
    </center>

    <script src="./random.js"></script>
</body>
</html>
